<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crônicas do Abismo das Eternidades</title>

<style>
:root{
 --bg:#050505;
 --gold:#c9a44c;
 --red:#8b0000;
 --text:#eaeaea;
}

body{
 margin:0;
 font-family:Georgia, serif;
 background:var(--bg);
 color:var(--text);
 overflow:hidden;
 transition:0.5s;
}

/* FUNDO VIVO */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background:radial-gradient(circle,#300000,#000);
 animation:bg 25s linear infinite;
 opacity:.3;
}
@keyframes bg{
 to{transform:translate(-30%,-30%)}
}

/* TELAS */
.screen{display:none;height:100vh;overflow:auto;padding:20px;}
.active{display:block}

/* OLHO */
.eye{
 width:200px;height:200px;border-radius:50%;
 background:radial-gradient(circle,red,black 70%);
 margin:auto;position:relative;
}
.pupil{
 width:60px;height:60px;background:black;border-radius:50%;
 position:absolute;top:70px;left:70px;
}

/* BOTÕES */
.btn{
 padding:12px 20px;
 background:linear-gradient(90deg,var(--red),var(--gold));
 border:none;color:white;cursor:pointer;
 margin:5px;
}

/* CARD */
.card{
 background:#111;padding:15px;margin:10px 0;border-radius:10px;
 cursor:pointer;border:1px solid #222;
}

/* PROGRESSO */
.progress{height:5px;background:#222;}
.bar{height:100%;background:var(--gold);width:0%;}

/* EDITOR */
.block{background:#111;padding:10px;margin:10px 0;}
[contenteditable]{outline:none}

/* CODEX */
#codexContent{background:#111;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="wind" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b3a1d.mp3"></audio>
<audio id="whisper" loop src="https://cdn.pixabay.com/audio/2021/09/06/audio_7c6e6cdb1b.mp3"></audio>

<div style="position:fixed;top:10px;right:10px;">
<button onclick="toggleAudio()">🔊</button>
<button onclick="toggleMode()">🌗</button>
<button onclick="exportBook()">📕</button>
</div>

<!-- CAPA -->
<div id="cover" class="screen active">
<div class="eye"><div class="pupil" id="pupil"></div></div>
<h1>Crônicas do Abismo</h1>
<button class="btn" onclick="start()">Despertar</button>
</div>

<!-- BIBLIOTECA -->
<div id="library" class="screen">
<h2>Continuar</h2>
<div id="continue"></div>

<h2>Episódios</h2>
<div id="episodes"></div>

<button class="btn" onclick="newChapter()">Novo</button>
<button class="btn" onclick="generateAI()">IA</button>
<button class="btn" onclick="openEditor()">Editor</button>
<button class="btn" onclick="openCodex()">Codex</button>
</div>

<!-- LEITOR -->
<div id="reader" class="screen">
<button onclick="back()">←</button>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="content"></div>
</div>

<!-- EDITOR -->
<div id="editor" class="screen">
<h2 contenteditable id="chapterTitle">Capítulo</h2>
<div id="canvas"></div>
<button onclick="addBlock()">+ Texto</button>
<button onclick="saveChapter()">Salvar</button>
</div>

<!-- CODEX -->
<div id="codex" class="screen">
<button onclick="back()">←</button>
<button onclick="addCodex()">+ Entrada</button>
<ul id="codexList"></ul>
<div id="codexContent"></div>
</div>

<script>
let db={chapters:[],progress:{},codex:[]}
let current=-1

/* OLHO */
document.addEventListener("mousemove",e=>{
 pupil.style.transform=`translate(${e.clientX/50}px,${e.clientY/50}px)`
})

/* AUDIO */
function toggleAudio(){
 wind.paused ? (wind.play(),whisper.play()) : (wind.pause(),whisper.pause())
}

/* MODO */
function toggleMode(){document.body.classList.toggle("gold")}

/* NAV */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
 document.getElementById(id).classList.add("active")
}

function start(){
 toggleAudio()
 renderEpisodes()
 show("library")
}

/* EPISÓDIOS */
function renderEpisodes(){
 episodes.innerHTML=db.chapters.map((c,i)=>`
  <div class="card" onclick="openEpisode(${i})">
   <h3>${c.title}</h3>
  </div>`).join("")
}

function openEpisode(i){
 current=i
 let c=db.chapters[i]
 content.innerHTML=`<h1>${c.title}</h1><p>${c.content}</p>`
 show("reader")
}

/* NOVO */
function newChapter(){
 let t=prompt("Título"),c=prompt("Texto")
 if(t&&c){db.chapters.push({title:t,content:c});renderEpisodes()}
}

/* EDITOR */
function openEditor(){show("editor")}
function addBlock(){
 let div=document.createElement("div")
 div.className="block"
 div.contentEditable=true
 canvas.appendChild(div)
}
function saveChapter(){
 let text=[...canvas.children].map(x=>x.innerHTML).join("<br>")
 db.chapters.push({title:chapterTitle.innerText,content:text})
 renderEpisodes()
}

/* CODEX */
function openCodex(){show("codex");renderCodex()}
function addCodex(){
 let n=prompt("Nome"); if(!n)return
 db.codex.push({name:n,text:""})
 renderCodex()
}
function renderCodex(){
 codexList.innerHTML=db.codex.map((c,i)=>`
  <li onclick="openEntry(${i})">${c.name}</li>`).join("")
}
function openEntry(i){
 let c=db.codex[i]
 codexContent.innerHTML=`
  <h2 contenteditable oninput="db.codex[${i}].name=this.innerText">${c.name}</h2>
  <div contenteditable oninput="db.codex[${i}].text=this.innerHTML">${c.text}</div>`
}

/* IA */
function generateAI(){
 db.chapters.push({
  title:"Gerado",
  content:"O abismo respondeu..."
 })
 renderEpisodes()
}

/* EXPORT */
function exportBook(){
 let txt=db.chapters.map(c=>c.title+"\n"+c.content).join("\n\n")
 let blob=new Blob([txt])
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="abismo.txt"
 a.click()
}

/* VOLTAR */
function back(){show("library")}
</script>

</body>
</html>
