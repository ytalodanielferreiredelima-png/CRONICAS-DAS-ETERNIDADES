<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crônicas do Abismo das Eternidades</title>

<style>
:root{
 --bg:#050505;
 --panel:#111;
 --accent:#8b0000;
 --gold:#c9a44c;
 --text:#eaeaea;
}

body{
 margin:0;
 font-family:Georgia, serif;
 background:var(--bg);
 color:var(--text);
 display:flex;
 height:100vh;
 overflow:hidden;
}

/* FUNDO VIVO */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background:radial-gradient(circle at center, #300000, #000);
 animation:moveBg 20s infinite linear;
 opacity:0.4;
}

@keyframes moveBg{
 from{transform:translate(0,0)}
 to{transform:translate(-25%,-25%)}
}

/* NAV */
nav{
 width:90px;
 background:#000;
 border-right:1px solid #222;
 display:flex;
 flex-direction:column;
 align-items:center;
 padding:20px 0;
 z-index:2;
}

nav button{
 background:none;
 border:none;
 color:#666;
 cursor:pointer;
 margin:10px 0;
 transition:.3s;
}

nav button:hover{color:white}
nav button.active{color:var(--gold)}

/* MAIN */
main{
 flex:1;
 overflow:auto;
 padding:30px;
 z-index:2;
}

.view{display:none}
.view.active{display:block}

/* CAPA */
.cover{
 text-align:center;
 padding-top:100px;
}

.cover h1{
 font-size:60px;
 color:var(--gold);
 text-shadow:0 0 20px rgba(255,215,0,0.3);
 animation:pulse 3s infinite;
}

@keyframes pulse{
 0%,100%{opacity:1}
 50%{opacity:0.6}
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
 gap:15px;
}

.card{
 background:var(--panel);
 border:1px solid #222;
 padding:15px;
 border-radius:8px;
 cursor:pointer;
 transition:.3s;
}

.card:hover{
 transform:scale(1.05);
 border-color:var(--accent);
}

/* EDITOR */
.block{
 background:#111;
 border:1px solid #222;
 padding:15px;
 border-radius:8px;
 margin-bottom:10px;
}

[contenteditable]{outline:none}

.title{font-size:28px;color:var(--gold)}
.text{font-size:16px}

.line{
 border-bottom:2px solid var(--accent);
 margin:10px 0;
}

/* TOOLBAR */
.toolbar{
 display:flex;
 gap:5px;
 margin-bottom:5px;
}

.toolbar button,input{
 background:#222;
 border:1px solid #333;
 color:white;
 padding:5px;
}

/* BOTÃO */
.fab{
 position:fixed;
 bottom:25px;
 right:25px;
 width:65px;
 height:65px;
 border-radius:50%;
 background:var(--accent);
 border:none;
 color:white;
 font-size:22px;
 cursor:pointer;
 box-shadow:0 0 20px rgba(139,0,0,0.5);
}

/* CODEX */
#codexContent{
 background:#111;
 padding:15px;
 border-radius:10px;
}
</style>
</head>

<body>

<nav>
<button onclick="view('cover')" id="btn-cover">🜂</button>
<button onclick="view('library')" id="btn-library">📚</button>
<button onclick="view('editor')" id="btn-editor">✍️</button>
<button onclick="view('codex')" id="btn-codex">📖</button>
<button onclick="view('adm')" id="btn-adm">⚙️</button>
</nav>

<main>

<!-- CAPA -->
<div id="cover" class="view cover">
<h1 id="titleDisplay">Crônicas do Abismo das Eternidades</h1>
<p id="authorDisplay">Autor Desconhecido</p>
</div>

<!-- BIBLIOTECA -->
<div id="library" class="view">
<h1>Capítulos</h1>
<div class="grid" id="chapters"></div>
<button onclick="newChapter()">+ Criar Capítulo</button>
</div>

<!-- EDITOR -->
<div id="editor" class="view">
<h1 contenteditable id="chapterTitle">Novo Capítulo</h1>

<div id="canvas"></div>

<button onclick="addBlock('title')">Título</button>
<button onclick="addBlock('text')">Texto</button>
<button onclick="addBlock('line')">Linha</button>

<button class="fab" onclick="saveChapter()">💾</button>
</div>

<!-- CODEX -->
<div id="codex" class="view">
<h1>Códice</h1>
<button onclick="addCodex()">+ Entrada</button>
<ul id="codexList"></ul>
<div id="codexContent"></div>
</div>

<!-- ADM -->
<div id="adm" class="view">
<h1>Configurações</h1>
<input id="titleInput" oninput="updateMeta()" placeholder="Título"><br><br>
<input id="authorInput" oninput="updateMeta()" placeholder="Autor"><br><br>
<button onclick="clearAll()">Apagar Tudo</button>
</div>

</main>

<script>
let db={meta:{title:"Crônicas do Abismo das Eternidades",author:"Autor"},chapters:[],codex:[]}
let current=-1

function saveDB(){localStorage.setItem("abismo",JSON.stringify(db))}
function loadDB(){let d=localStorage.getItem("abismo"); if(d) db=JSON.parse(d)}

function view(v){
 document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"))
 document.getElementById(v).classList.add("active")
}

function addBlock(type,html=""){
 let div=document.createElement("div")
 div.className="block"

 if(type==="line"){
  div.innerHTML=`<div class="line"></div>`
 }else{
  div.innerHTML=`
   <div class="toolbar">
    <button onclick="document.execCommand('bold')">B</button>
    <button onclick="document.execCommand('italic')">I</button>
    <input type="color" onchange="document.execCommand('foreColor',false,this.value)">
   </div>
   <div contenteditable class="${type}">${html}</div>
  `
 }

 canvas.appendChild(div)
}

/* CAPÍTULOS */
function renderChapters(){
 chapters.innerHTML=db.chapters.map((c,i)=>`
  <div class="card" onclick="loadChapter(${i})">
   <h3>${c.title}</h3>
  </div>
 `).join("")
}

function newChapter(){
 current=-1
 canvas.innerHTML=""
 chapterTitle.innerText="Novo Capítulo"
 view("editor")
}

function loadChapter(i){
 current=i
 let ch=db.chapters[i]
 chapterTitle.innerText=ch.title
 canvas.innerHTML=""
 ch.content.forEach(b=>addBlock(b.type,b.html))
 view("editor")
}

function saveChapter(){
 let blocks=[]
 document.querySelectorAll("#canvas div[contenteditable]").forEach(el=>{
  blocks.push({type:el.className,html:el.innerHTML})
 })

 let data={title:chapterTitle.innerText,content:blocks}

 if(current==-1) db.chapters.push(data)
 else db.chapters[current]=data

 saveDB()
 alert("Salvo!")
 view("library")
 renderChapters()
}

/* CODEX */
function addCodex(){
 let name=prompt("Nome:")
 if(!name)return
 db.codex.push({name,text:""})
 saveDB()
 renderCodex()
}

function renderCodex(){
 codexList.innerHTML=db.codex.map((c,i)=>`
  <li onclick="openCodex(${i})">${c.name}</li>
 `).join("")
}

function openCodex(i){
 let c=db.codex[i]
 codexContent.innerHTML=`
  <h2 contenteditable oninput="db.codex[${i}].name=this.innerText;saveDB()">${c.name}</h2>
  <div contenteditable oninput="db.codex[${i}].text=this.innerHTML;saveDB()">${c.text}</div>
 `
}

/* META */
function updateMeta(){
 db.meta.title=titleInput.value
 db.meta.author=authorInput.value
 titleDisplay.innerText=db.meta.title
 authorDisplay.innerText=db.meta.author
 saveDB()
}

function clearAll(){
 if(confirm("Apagar tudo?")){
  localStorage.clear()
  location.reload()
 }
}

/* INIT */
loadDB()
titleInput.value=db.meta.title
authorInput.value=db.meta.author
updateMeta()
view("cover")
</script>

</body>
</html>
