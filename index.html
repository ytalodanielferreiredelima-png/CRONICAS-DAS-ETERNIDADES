<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Crônicas do Abismo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Share+Tech+Mono&display=swap');

        :root {
            /* Palette das Imagens */
            --bg-deep: #03020a;
            --bg-surface: #0d0b1a;
            --bg-elevated: #161426;
            --gold: #c8a84b;
            --gold-glow: rgba(200, 168, 75, 0.4);
            --mnemis-purple: #6b3fa0;
            --text-main: #d4cce8;
            --text-muted: #7a7090;
            --danger: #ff3355;
            --success: #00ffaa;
            --border-low: rgba(200, 168, 75, 0.15);
            
            /* Fontes */
            --font-fancy: 'Cinzel', serif;
            --font-body: 'EB Garamond', serif;
            --font-mono: 'Share Tech Mono', monospace;
            
            /* Transitions */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Global Reset & Scrollbar --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Layout: Admin Sidebar & Topbar --- */
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border-low);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Header Administrativo (Baseado na Foto 4) --- */
        .top-panel {
            background: rgba(13, 11, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-low);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--gold), #f0d080);
            border: 2px solid var(--bg-deep);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        /* --- Editor de Blocos Avançado (Fotos 1, 2, 3) --- */
        .editor-workspace {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
        }

        .block-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-low);
            border-radius: 4px;
            transition: var(--transition);
            position: relative;
        }

        .block-card.active {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(200, 168, 75, 0.1);
            transform: translateX(10px);
        }

        /* Toolbar Interna (Foto 3) */
        .block-toolbar {
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tool-group {
            display: flex;
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-tool {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-tool:hover, .btn-tool.active {
            color: var(--gold);
            background: rgba(200, 168, 75, 0.1);
        }

        /* Seletor de Cores (Foto 2) */
        .color-palette {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }

        .color-swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color-swatch:hover { transform: scale(1.3); }
        .color-swatch.active { border-color: #fff; box-shadow: 0 0 5px #fff; }

        /* --- Lista de Capítulos (Foto 7) --- */
        .chapter-list-container {
            margin-top: 50px;
            background: var(--bg-surface);
            border: 1px solid var(--border-low);
            padding: 25px;
            border-radius: 8px;
        }

        .chapter-row {
            display: grid;
            grid-template-columns: 50px 1fr auto;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
        }

        .chapter-row:hover {
            background: rgba(255,255,255,0.02);
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-pill.published { color: var(--gold); }
        .status-pill.draft { color: var(--text-muted); border: 1px solid var(--text-muted); }
        .status-pill.new { background: var(--gold); color: var(--bg-deep); font-weight: bold; }

        /* --- Modal de Edição (Foto 10) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* Ativado via JS */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .book-edit-modal {
            background: var(--bg-elevated);
            width: 600px;
            border: 1px solid var(--gold);
            padding: 30px;
            position: relative;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-family: var(--font-fancy);
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .admin-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-low);
            padding: 12px;
            color: var(--text-main);
            font-family: var(--font-body);
            outline: none;
        }

        .admin-input:focus { border-color: var(--gold); }

        /* --- Mnemies Style (Foto 1) --- */
        .mnemis-block {
            background: linear-gradient(to right, rgba(107, 63, 160, 0.1), transparent);
            border-left: 4px solid var(--mnemis-purple) !important;
        }

        .mnemis-title {
            color: var(--mnemis-purple);
            font-family: var(--font-fancy);
            font-size: 0.7rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- Helper Classes --- */
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .btn-gold { 
            background: var(--gold); 
            color: var(--bg-deep); 
            border: none; 
            padding: 10px 25px; 
            font-family: var(--font-fancy); 
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-gold:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--gold-glow); }

    </style>
</head>
<body>

    <header class="top-panel">
        <div class="admin-brand">
            <div class="avatar-circle"></div>
            <div>
                <h4 style="font-family: var(--font-fancy); font-size: 14px; letter-spacing: 1px;">PAINEL ADMINISTRATIVO</h4>
                <p style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);">STATUS: GUARDIÃO CONECTADO</p>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="btn-tool" style="border: 1px solid var(--border-low);">👁️ VER SITE</button>
            <button class="btn-tool" style="color: var(--danger);">🚪 SAIR</button>
        </div>
    </header>

    <div class="admin-layout">
        <aside class="sidebar">
            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-tool active" style="text-align: left; padding: 15px;">📜 LIVROS</button>
                <button class="btn-tool" style="text-align: left; padding: 15px;">👥 LEITORES</button>
                <button class="btn-tool" style="text-align: left; padding: 15px;">📊 ESTATÍSTICAS</button>
                <button class="btn-tool" style="text-align: left; padding: 15px;">⚙️ CONFIGURAÇÕES</button>
            </nav>
            <div style="margin-top: auto; padding: 20px; border: 1px solid var(--border-low); border-radius: 4px;">
                <p style="font-size: 11px; color: var(--text-muted);">SISTEMA v4.2.0</p>
                <p style="font-size: 11px; color: var(--gold);">CRÔNICAS DO ABISMO</p>
            </div>
        </aside>

        <main class="main-content">
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
                <div>
                    <button class="btn-tool" style="margin-bottom: 10px;">← VOLTAR</button>
                    <h1 style="font-family: var(--font-fancy); color: var(--gold);">PARTE I: O CREPÚSCULO</h1>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-tool" style="padding: 12px 25px;">DESCARTAR</button>
                    <button class="btn-gold">SALVAR ALTERAÇÕES</button>
                </div>
            </div>

            <section>
                <div style="display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.02);">
                    <button class="btn-tool" onclick="editor.addBlock('text')"><i class="fas fa-align-left"></i> TEXTO</button>
                    <button class="btn-tool" onclick="editor.addBlock('title')"><i class="fas fa-heading"></i> TÍTULO</button>
                    <button class="btn-tool" onclick="editor.addBlock('line')"><i class="fas fa-minus"></i> LINHA</button>
                    <button class="btn-tool" onclick="editor.addBlock('mnemis')" style="color: #fff; background: var(--mnemis-purple);">✨ MNEMIS</button>
                </div>

                <div id="editor-canvas" class="editor-workspace">
                    </div>
            </section>

            <section class="chapter-list-container">
                <h3 style="font-family: var(--font-fancy); color: var(--gold); margin-bottom: 20px;">ATIVIDADE DE LEITURA</h3>
                <div id="readers-list">
                    </div>
            </section>

        </main>
    </div>

    <div id="modal-edit-book" class="modal-overlay">
        <div class="book-edit-modal">
            <h2 style="font-family: var(--font-fancy); color: var(--gold); margin-bottom: 25px;">EDITAR METADADOS DO LIVRO</h2>
            <div class="input-group">
                <label>TÍTULO DA OBRA</label>
                <input type="text" class="admin-input" value="O CREPÚSCULO DAS SOMBRAS ETERNAS">
            </div>
            <div class="input-group">
                <label>SINOPSE (EPÍGRAFE)</label>
                <textarea rows="5" class="admin-input">Em um futuro marcado pelo colapso da civilização...</textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label>TIPO DE SAGA</label>
                    <select class="admin-input">
                        <option>SAGA PRINCIPAL</option>
                        <option>CONTO PARALELO</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>ORDEM DE LEITURA</label>
                    <input type="number" class="admin-input" value="1">
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                <button class="btn-tool" onclick="closeModal()">CANCELAR</button>
                <button class="btn-gold" onclick="closeModal()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ENGINE: Crônicas do Abismo - Admin v4.2
         * Responsável pela manipulação de blocos, persistência e UI.
         */
        
        const editor = {
            blocks: [],
            canvas: document.getElementById('editor-canvas'),

            init() {
                // Adiciona blocos iniciais baseados nas fotos
                this.addBlock('title', { content: 'O DESPERTAR DO ABISMO', size: 'MEDIUM', color: '#c8a84b' });
                this.addBlock('mnemis', { content: 'As memórias são fios de prata no tecido do tempo...' });
                this.renderReaders();
            },

            addBlock(type, data = {}) {
                const id = Date.now();
                const blockData = {
                    id,
                    type,
                    content: data.content || '',
                    settings: {
                        size: data.size || 'MEDIUM',
                        color: data.color || '#fff',
                        style: data.style || 'CLASSIC'
                    }
                };
                
                this.blocks.push(blockData);
                this.renderBlocks();
            },

            removeBlock(id) {
                this.blocks = this.blocks.filter(b => b.id !== id);
                this.renderBlocks();
            },

            renderBlocks() {
                this.canvas.innerHTML = '';
                this.blocks.forEach(block => {
                    const el = document.createElement('div');
                    el.className = `block-card ${block.type === 'mnemis' ? 'mnemis-block' : ''}`;
                    el.innerHTML = this.getBlockTemplate(block);
                    this.canvas.appendChild(el);
                });
            },

            getBlockTemplate(block) {
                // Template de Toolbar (Referência Foto 3)
                const toolbar = `
                    <div class="block-toolbar">
                        <span style="font-family: var(--font-mono); font-size: 9px; color: var(--gold);">:: ${block.type.toUpperCase()}</span>
                        <div class="tool-group">
                            <button class="btn-tool">SMALL</button>
                            <button class="btn-tool active">MEDIUM</button>
                            <button class="btn-tool">LARGE</button>
                        </div>
                        <div class="color-palette">
                            <div class="color-swatch" style="background: #fff"></div>
                            <div class="color-swatch" style="background: #ff3355"></div>
                            <div class="color-swatch" style="background: #c8a84b"></div>
                            <div class="color-swatch" style="background: #6b3fa0"></div>
                        </div>
                        <button class="btn-tool" style="margin-left: auto; color: var(--danger);" onclick="editor.removeBlock(${block.id})">🗑️</button>
                    </div>
                `;

                let contentHtml = '';
                if(block.type === 'title') {
                    contentHtml = `<input type="text" class="admin-input" style="background:transparent; border:none; font-family:var(--font-fancy); font-size: 24px; color:${block.settings.color}" value="${block.content}" placeholder="TÍTULO DO BLOCO...">`;
                } else if(block.type === 'mnemis') {
                    contentHtml = `
                        <div style="padding: 20px;">
                            <div class="mnemis-title">✦ MNEMIS</div>
                            <textarea class="admin-input" style="background:transparent; border:none; font-style: italic;">${block.content}</textarea>
                        </div>
                    `;
                } else {
                    contentHtml = `<textarea class="admin-input" style="background:transparent; border:none;" rows="3" placeholder="Escreva o texto aqui...">${block.content}</textarea>`;
                }

                return toolbar + contentHtml;
            },

            renderReaders() {
                const readers = [
                    { name: 'GUARDIÃO', chapters: 4, date: '25/04/2026', color: 'var(--gold)' },
                    { name: 'SAMUEL', chapters: 6, date: '25/04/2026', color: '#ffcc00' },
                    { name: 'ANONIMO', chapters: 1, date: '24/04/2026', color: '#7a7090' }
                ];

                const container = document.getElementById('readers-list');
                readers.forEach(r => {
                    container.innerHTML += `
                        <div class="chapter-row">
                            <div class="avatar-circle" style="width:30px; height:30px; background:${r.color}"></div>
                            <div>
                                <p style="font-family: var(--font-fancy); font-size: 13px;">${r.name}</p>
                                <p style="font-size: 10px; color: var(--text-muted);">${r.chapters} CAPÍTULOS LIDOS</p>
                            </div>
                            <div style="font-family: var(--font-mono); font-size: 10px;">${r.date}</div>
                        </div>
                    `;
                });
            }
        };

        // Modal Helpers
        function openModal() { document.getElementById('modal-edit-book').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-edit-book').style.display = 'none'; }

        // Inicialização
        window.onload = () => editor.init();
    </script>
</body>
</html>
