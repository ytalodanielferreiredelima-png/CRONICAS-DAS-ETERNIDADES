<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldBuilder Studio</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --accent: #007bff;
      --text: #e0e0e0;
      --border: #333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Navegação Lateral */
    nav {
      width: 80px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 20px;
    }

    nav button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.3s;
    }

    nav button.active { color: var(--accent); }
    nav button:hover { color: white; }

    /* Áreas de Conteúdo */
    main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
    .view { display: none; max-width: 900px; margin: auto; }
    .view.active { display: block; }

    /* Capa */
    .cover-container {
      text-align: center;
      padding: 60px;
      border: 2px dashed var(--border);
      border-radius: 15px;
    }

    /* Biblioteca e Listas */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--panel);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    /* Editor */
    .block { background: var(--panel); padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); }
    [contenteditable] { outline: none; min-height: 20px; }
    .title { font-size: 24px; font-weight: bold; }
    .line { border-bottom: 2px solid var(--border); margin: 10px 0; }
    
    .toolbar { margin-bottom: 10px; display: flex; gap: 5px; }
    .toolbar button, select { background: #333; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; }

    /* Botões Flutuantes */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      color: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<nav>
  <button onclick="showView('v-cover')" id="btn-cover">🖼️<br>Capa</button>
  <button onclick="showView('v-library')" id="btn-library">📚<br>Biblio</button>
  <button onclick="showView('v-editor')" id="btn-editor">✍️<br>Editor</button>
  <button onclick="showView('v-codex')" id="btn-codex">📖<br>Códice</button>
  <button onclick="showView('v-adm')" id="btn-adm">⚙️<br>Adm</button>
</nav>

<main>
  <div id="v-cover" class="view">
    <h1>Capa do Projeto</h1>
    <div class="cover-container">
      <h1 id="display-title" style="font-size: 48px;">Título do Livro</h1>
      <p id="display-author">Nome do Autor</p>
    </div>
  </div>

  <div id="v-library" class="view">
    <h1>Minha Biblioteca</h1>
    <div class="grid" id="library-grid">
      </div>
  </div>

  <div id="v-editor" class="view">
    <h1 contenteditable="true" id="current-chapter-title">Novo Capítulo</h1>
    <div id="editor-canvas"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button onclick="addBlock('title')">+ Título</button>
      <button onclick="addBlock('text')">+ Texto</button>
      <button onclick="addBlock('line')">+ Linha</button>
    </div>
    <button class="fab" onclick="saveAll()">💾</button>
  </div>

  <div id="v-codex" class="view">
    <h1>Enciclopédia & Códice</h1>
    <div style="display: flex; gap: 20px;">
      <div style="width: 200px; border-right: 1px solid var(--border);">
        <button onclick="addCodexEntry()">+ Nova Entrada</button>
        <ul id="codex-list" style="list-style:none; padding:0;"></ul>
      </div>
      <div id="codex-content" style="flex:1; padding: 20px;">
        <p>Selecione um item para ver os detalhes.</p>
      </div>
    </div>
  </div>

  <div id="v-adm" class="view">
    <h1>Configurações do Projeto</h1>
    <div class="block">
      <h3>Informações Gerais</h3>
      <label>Título: </label><input type="text" id="input-title" oninput="updateMeta()"><br><br>
      <label>Autor: </label><input type="text" id="input-author" oninput="updateMeta()">
    </div>
    <div class="block" style="border-color: #f44336;">
      <h3 style="color: #f44336;">Zona de Perigo</h3>
      <button onclick="clearDatabase()" style="background: #f44336; color: white; border:none; padding:10px; border-radius:5px;">Apagar Tudo</button>
    </div>
  </div>
</main>

<script>
  // ESTADO GLOBAL
  let project = {
    meta: { title: "Meu Livro", author: "Escritor" },
    chapters: [],
    codex: []
  };

  // NAVEGAÇÃO
  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    document.getElementById('btn-' + viewId.split('-')[1]).classList.add('active');
    
    if(viewId === 'v-library') renderLibrary();
  }

  // EDITOR LOGIC
  function addBlock(type, content = "") {
    const canvas = document.getElementById('editor-canvas');
    const block = document.createElement("div");
    block.className = "block";
    
    let html = `
      <div class="toolbar">
        <button onclick="document.execCommand('bold')">B</button>
        <button onclick="document.execCommand('italic')">I</button>
      </div>
      <div contenteditable="true" class="${type}">${content}</div>
    `;
    
    if(type === 'line') html = `<div class="line"></div>`;
    
    block.innerHTML = html;
    canvas.appendChild(block);
  }

  // BIBLIOTECA
  function renderLibrary() {
    const grid = document.getElementById('library-grid');
    grid.innerHTML = project.chapters.map((ch, index) => `
      <div class="card" onclick="loadChapter(${index})">
        <h3>${ch.title}</h3>
        <p>${ch.content.length} blocos de texto</p>
      </div>
    `).join('');
  }

  // SALVAMENTO
  function saveAll() {
    const chapterTitle = document.getElementById('current-chapter-title').innerText;
    const blocks = [];
    document.querySelectorAll('#editor-canvas .block div[contenteditable]').forEach(div => {
      blocks.push({ type: div.className, html: div.innerHTML });
    });

    project.chapters.push({ title: chapterTitle, content: blocks });
    localStorage.setItem('myProject', JSON.stringify(project));
    alert("Capítulo salvo na biblioteca!");
    showView('v-library');
  }

  // ADMIN & META
  function updateMeta() {
    project.meta.title = document.getElementById('input-title').value;
    project.meta.author = document.getElementById('input-author').value;
    document.getElementById('display-title').innerText = project.meta.title;
    document.getElementById('display-author').innerText = project.meta.author;
    localStorage.setItem('myProject', JSON.stringify(project));
  }

  function clearDatabase() {
    if(confirm("Tem certeza? Isso apagará todo o seu livro!")) {
      localStorage.clear();
      location.reload();
    }
  }

  // INICIALIZAÇÃO
  window.onload = () => {
    const saved = localStorage.getItem('myProject');
    if(saved) project = JSON.parse(saved);
    
    document.getElementById('input-title').value = project.meta.title;
    document.getElementById('input-author').value = project.meta.author;
    updateMeta();
    showView('v-cover');
  }
</script>
</body>
</html>
